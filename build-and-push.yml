name: build-and-push

# Reliable build path for this project: GitHub Actions (Docker-in-Docker and
# rootless Podman on the GPU pod itself are unreliable). The runner builds the
# image with the baked lightweight models and pushes to Docker Hub.

on:
  push:
    branches: [ main, master ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      cuda_image:
        description: "Base CUDA image (must be 12.8+ for Blackwell sm_120)"
        default: "nvidia/cuda:12.8.0-cudnn-runtime-ubuntu24.04"

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/vrps-runpod

jobs:
  build:
    runs-on: ubuntu-latest
    # The baked models (~1 GB) are downloaded during the build; give it room.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_IMAGE=${{ github.event.inputs.cuda_image || 'nvidia/cuda:12.8.0-cudnn-runtime-ubuntu24.04' }}
          # No GPU on the runner, so the build never executes GPU code. The
          # baked-model step only downloads ONNX files (CPU). TRT engines are
          # built later on the pod (they are GPU-specific and must NOT be baked).
          provenance: false
